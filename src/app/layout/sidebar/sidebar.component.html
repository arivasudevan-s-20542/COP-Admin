<aside class="sidebar" [class.collapsed]="isCollapsed()">
  <!-- Logo Section -->
  <div class="sidebar-header">
    <div class="logo">
      <i class="pi pi-bolt logo-icon"></i>
      @if (!isCollapsed()) {
        <span class="logo-text">ZCOP Admin</span>
      }
    </div>
    <button 
      pButton 
      type="button" 
      icon="pi pi-bars"
      class="p-button-text p-button-rounded toggle-btn"
      (click)="onToggleSidebar()"
      pTooltip="Toggle Sidebar"
      tooltipPosition="right"
    ></button>
  </div>

  <!-- Navigation Menu -->
  <nav class="sidebar-nav">
    @if (!isCollapsed()) {
      <p-panelMenu [model]="menuItems()" [multiple]="false" styleClass="sidebar-menu" />
    } @else {
      <!-- Collapsed icon-only menu -->
      <div class="collapsed-menu">
        @for (item of menuItems(); track item.label) {
          <a 
            [routerLink]="item.routerLink" 
            routerLinkActive="active"
            class="collapsed-menu-item"
            [pTooltip]="item.label"
            tooltipPosition="right"
          >
            <i [class]="item.icon"></i>
            @if (item.badge) {
              <p-badge [value]="item.badge" [severity]="item.badgeSeverity || 'info'" class="menu-badge" />
            }
          </a>
        }
      </div>
    }
  </nav>

  <!-- User Section -->
  @if (user()) {
    <div class="sidebar-footer">
      @if (!isCollapsed()) {
        <div class="user-info">
          <img [src]="user()!.avatar" [alt]="user()!.name" class="user-avatar" />
          <div class="user-details">
            <span class="user-name">{{ user()!.name }}</span>
            <span class="user-role">{{ user()!.role | titlecase }}</span>
          </div>
        </div>
      } @else {
        <img 
          [src]="user()!.avatar" 
          [alt]="user()!.name" 
          class="user-avatar collapsed-avatar"
          [pTooltip]="user()!.name"
          tooltipPosition="right"
        />
      }
    </div>
  }
</aside>
